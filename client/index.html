<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitTracker</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #020810 0%, #07101f 50%, #020810 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.45s ease;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      #splash.splash-done {
        opacity: 0;
        pointer-events: none;
      }

      .splash-icon {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, #1d4ed8, #6d28d9);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
        box-shadow: 0 8px 32px rgba(37, 99, 235, 0.35);
      }

      .splash-logo {
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.02em;
        margin-bottom: 32px;
        user-select: none;
      }
      .splash-logo .fit     { color: #60a5fa; }
      .splash-logo .tracker { color: white; }

      .splash-track {
        width: 160px;
        height: 3px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 999px;
        overflow: hidden;
      }
      .splash-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        border-radius: 999px;
        animation: splashLoad 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      .splash-bar.complete {
        animation: none;
        width: 100% !important;
        transition: width 0.18s ease;
      }
      @keyframes splashLoad {
        0%   { width: 0% }
        100% { width: 72% }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
          <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/>
        </svg>
      </div>
      <div class="splash-logo">
        <span class="fit">Fit</span><span class="tracker">Tracker</span>
      </div>
      <div class="splash-track">
        <div class="splash-bar" id="splash-bar"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
